<style>
  /* Embed page: no chrome at all. The frame fills the viewport. */
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body { display: flex; align-items: stretch; justify-content: stretch; }
  .ww-embed-frame {
    flex: 1;
    position: relative;
    background: var(--ww-card-bg, #ffffff);
    color: var(--ww-fg, inherit);
    overflow: hidden;
  }
  .ww-embed-frame > #ww-player-widget {
    position: absolute;
    inset: 0;
    overflow: auto;
    padding: 1rem;
  }
</style>
</head>
<body>
<div id="ww-embed-frame" class="ww-embed-frame ww-player-frame">
  <div id="ww-player-widget"></div>
</div>

<script>
window.__wwClearAll = async function() {
  if (!confirm('¿Borrar caché?')) return;
  try { localStorage.clear(); sessionStorage.clear(); } catch {}
  location.href = location.pathname + '?_=' + Date.now() + location.search;
};
(function(){
  let shown = false;
  function show(msg){
    if (shown) return; shown = true;
    document.body.innerHTML = '<div class="alert alert-danger m-4"><h4><i class="bi bi-bug-fill"></i> Error</h4><pre style="white-space:pre-wrap">'+String(msg).replace(/[<>&]/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]))+'</pre></div>';
  }
  window.addEventListener('error', e => show(e.error?.stack || e.message));
  window.addEventListener('unhandledrejection', e => show(e.reason?.stack || e.reason));
  setTimeout(()=>{ if (!window.__APP_READY__) show('La actividad no cargó en 8s.'); }, 8000);
})();
</script>
<script type="module" src="main.embed.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
