<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WW · Tests</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
  <h1>WW · Tests unitarios</h1>
  <p class="text-muted">Pure unit tests para módulos sin dependencias de red.</p>
  <div id="results"></div>
</div>

<script type="module">
import { migrate, normalize, newActivity } from '../core/migrate.js';
import { isAcceptableNickname } from '../core/nicknameFilter.js';
import { isCorrect } from '../core/contentModels/qa.js';
import { reorderArray } from '../core/editorPrimitives.js';
import { exportActivities, importActivitiesJson } from '../core/io.js';
import { scoreQuizSubmission } from '../templates/quiz/scorer.js';
// Templates must be registered for migrate normalize() to find their defaults.
import '../templates/quiz/index.js';
import '../templates/wheel/index.js';
import '../templates/match/index.js';
import '../templates/memory/index.js';

const results = document.getElementById('results');
let passed = 0, failed = 0;

function test(name, fn) {
  try {
    fn();
    passed++;
    results.insertAdjacentHTML('beforeend', `<div class="text-success">✓ ${name}</div>`);
  } catch (e) {
    failed++;
    results.insertAdjacentHTML('beforeend', `<div class="text-danger">✗ ${name}<pre class="mb-0 small">${e.stack || e.message}</pre></div>`);
  }
}
function assert(cond, msg = 'assertion failed') { if (!cond) throw new Error(msg); }
function eq(a, b, msg) { if (JSON.stringify(a) !== JSON.stringify(b)) throw new Error(`${msg||'eq'}: ${JSON.stringify(a)} !== ${JSON.stringify(b)}`); }

// migrate v1 -> v4
test('migrate v1 quiz -> v4 fills defaults', () => {
  const v1 = { id: 'act_test1234', title: 'X', items: [{ question: 'q', answer: 'a', options: ['a','b'] }] };
  const out = migrate(v1);
  assert(out.schemaVersion === 4, 'schema bumped to 4');
  assert(Array.isArray(out.content.items), 'items in content');
  assert(out.live && typeof out.live === 'object', 'live present');
  assert(out.tags && Array.isArray(out.tags), 'tags present');
  assert(out.language === 'es', 'language defaulted');
});
test('newActivity quiz has defaults', () => {
  const a = newActivity('quiz');
  assert(a.template === 'quiz');
  assert(a.content.items.length >= 1);
  assert(a.live.questionTimer);
});
test('newActivity wheel has entries', () => {
  const a = newActivity('wheel');
  assert(Array.isArray(a.content.entries));
  assert(a.content.entries.length >= 4);
});

// nicknameFilter
test('nickname accepts valid', () => {
  assert(isAcceptableNickname('Ana').ok);
  assert(isAcceptableNickname('María José').ok);
  assert(isAcceptableNickname('user_42').ok);
});
test('nickname rejects too short', () => {
  assert(!isAcceptableNickname('A').ok);
  assert(!isAcceptableNickname('').ok);
});
test('nickname rejects slurs', () => {
  assert(!isAcceptableNickname('puto').ok);
  assert(!isAcceptableNickname('shit').ok);
  assert(!isAcceptableNickname('cabrón').ok); // diacritic-stripped match
});

// content models qa.isCorrect
test('isCorrect strict equal trim+lower+nfd', () => {
  eq(isCorrect({ answer: 'París' }, 'paris'), true);
  eq(isCorrect({ answer: 'París' }, ' Paris '), true);
  eq(isCorrect({ answer: 'París' }, 'londres'), false);
});
test('isCorrect array of valid answers', () => {
  eq(isCorrect({ answer: ['Sí', 'Si'] }, 'si'), true);
  eq(isCorrect({ answer: ['Sí', 'Si'] }, 'no'), false);
});
test('isCorrect null when no answer', () => {
  eq(isCorrect({ answer: null }, 'whatever'), null);
});

// reorderArray
test('reorderArray up/down', () => {
  const a = [1,2,3,4];
  reorderArray(a, 2, -1); eq(a, [1,3,2,4]);
  reorderArray(a, 2, +1); eq(a, [1,3,4,2]);
});
test('reorderArray rejects out of bounds', () => {
  const a = [1,2,3];
  eq(reorderArray(a, 0, -1), false);
  eq(reorderArray(a, 2, +1), false);
});

// scoring
test('scoreQuizSubmission flat correct', () => {
  const item = { answer: 'Madrid', points: 2 };
  const a = { scoring: { mode: 'flat' }, live: {} };
  const r = scoreQuizSubmission({ value: 'madrid', item, msTaken: 1000, activity: a, mode: 'solo' });
  eq(r.correct, true); eq(r.points, 2);
});
test('scoreQuizSubmission flat wrong with no penalty', () => {
  const item = { answer: 'Madrid', points: 2 };
  const a = { scoring: { mode: 'flat' }, live: {} };
  const r = scoreQuizSubmission({ value: 'londres', item, msTaken: 1000, activity: a, mode: 'solo' });
  eq(r.correct, false); eq(r.points, 0);
});
test('scoreQuizSubmission live kahoot speed bonus', () => {
  const item = { answer: 'Madrid', points: 1 };
  const a = { scoring: {}, live: { pointsModel: 'kahoot', questionTimer: 20, speedBonusMax: 1000 } };
  const fast = scoreQuizSubmission({ value: 'madrid', item, msTaken: 1000, activity: a, mode: 'live' });
  const slow = scoreQuizSubmission({ value: 'madrid', item, msTaken: 19000, activity: a, mode: 'live' });
  assert(fast.points > slow.points, 'fast > slow');
});
test('scoreQuizSubmission solo ignores live config by default', () => {
  const item = { answer: 'Madrid', points: 1 };
  const a = { scoring: { mode: 'flat' }, live: { pointsModel: 'kahoot', questionTimer: 20, speedBonusMax: 1000 } };
  const r = scoreQuizSubmission({ value: 'madrid', item, msTaken: 100, activity: a, mode: 'solo' });
  eq(r.points, 1, 'flat in solo even if live=kahoot');
});

// io export/import roundtrip
test('io export/import roundtrip preserves shape', async () => {
  const a = newActivity('quiz');
  a.title = 'Round trip';
  // Stub the export by passing a single id is tricky w/o storage; use the
  // wrapper structure manually.
  const wrapper = { format: 'ww-activities', version: 1, exportedAt: new Date().toISOString(), activities: [a] };
  // import from string path
  const r = await importActivitiesJson(JSON.stringify(wrapper), { strategy: 'preserve' });
  // Note: import calls save() which writes to localStorage. We can't easily
  // verify it without polluting; just check no errors.
  assert(r.errors.length === 0, 'no errors');
  assert(r.count === 1, 'one imported');
});

results.insertAdjacentHTML('beforeend', `<hr><h4 class="${failed?'text-danger':'text-success'}">${passed} passed, ${failed} failed</h4>`);
</script>
</body>
</html>
