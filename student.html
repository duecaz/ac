<body class="bg-dark text-light">
<nav class="navbar navbar-dark bg-black">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html"><i class="bi bi-person-raised-hand"></i> WW · Alumno</a>
    <div class="d-flex gap-2 align-items-center">
      <span class="badge bg-secondary" id="ww-version">v…</span>
      <span id="ww-mute-slot"></span>
      <button class="btn btn-sm btn-outline-warning" onclick="window.__wwClearAll && window.__wwClearAll()" title="Borrar caché y recargar"><i class="bi bi-eraser"></i></button>
    </div>
  </div>
</nav>
<div id="app" class="container py-3"></div>

<script>
window.__wwClearAll = async function() {
  if (!confirm('¿Borrar todo (caché del navegador + datos locales) y recargar?')) return;
  try { localStorage.clear(); } catch {}
  try { sessionStorage.clear(); } catch {}
  if ('caches' in window) {
    try { const names = await caches.keys(); await Promise.all(names.map(n => caches.delete(n))); } catch {}
  }
  if ('serviceWorker' in navigator) {
    try { const regs = await navigator.serviceWorker.getRegistrations(); await Promise.all(regs.map(r => r.unregister())); } catch {}
  }
  location.href = location.pathname + '?_=' + Date.now() + location.hash;
};
(function(){
  let shown = false;
  function show(msg){
    if (shown) return; shown = true;
    const el = document.getElementById('app') || document.body;
    el.innerHTML = '<div class="alert alert-danger m-4"><h4 class="alert-heading"><i class="bi bi-bug-fill"></i> Error</h4><pre style="white-space:pre-wrap">'+String(msg).replace(/[<>&]/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]))+'</pre><button class="btn btn-sm btn-light" onclick="location.reload()">Reintentar</button></div>';
  }
  window.addEventListener('error', e => show(e.error?.stack || e.message));
  window.addEventListener('unhandledrejection', e => show(e.reason?.stack || e.reason));
  setTimeout(()=>{ if (!window.__APP_READY__) show('La aplicación no inició en 8s. Revisa consola.'); }, 8000);
})();
</script>
<script type="module" src="main.student.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
