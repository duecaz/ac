<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles/theme.css">
<link rel="stylesheet" href="styles/live.css">
<link rel="stylesheet" href="styles/player.css">
<link rel="stylesheet" href="styles/quiz.css">
<link rel="stylesheet" href="styles/match.css">
<link rel="stylesheet" href="styles/memory.css">

<link rel="stylesheet" href="styles/touch.css">
</head>
<body class="bg-dark text-light">
<nav class="navbar navbar-dark bg-black">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html"><i class="bi bi-person-raised-hand"></i> WW · Alumno</a>
    <div class="d-flex gap-2 align-items-center">
      <span class="badge bg-secondary" id="ww-version">v…</span>
      <button class="btn btn-sm btn-outline-warning" onclick="if(confirm('¿Borrar caché local?')){localStorage.clear();sessionStorage.clear();location.reload(true);}" title="Borrar caché"><i class="bi bi-eraser"></i></button>
    </div>
  </div>
</nav>
<div id="app" class="container py-3"></div>

<script>
(function(){
  let shown = false;
  function show(msg){
    if (shown) return; shown = true;
    const el = document.getElementById('app') || document.body;
    el.innerHTML = '<div class="alert alert-danger m-4"><h4 class="alert-heading"><i class="bi bi-bug-fill"></i> Error</h4><pre style="white-space:pre-wrap">'+String(msg).replace(/[<>&]/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]))+'</pre><button class="btn btn-sm btn-light" onclick="location.reload()">Reintentar</button></div>';
  }
  window.addEventListener('error', e => show(e.error?.stack || e.message));
  window.addEventListener('unhandledrejection', e => show(e.reason?.stack || e.reason));
  setTimeout(()=>{ if (!window.__APP_READY__) show('La aplicación no inició en 8s. Revisa consola.'); }, 8000);
})();
</script>
<script type="module" src="main.student.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
